<!DOCTYPE html>
<html lang="en">
<head>

<title>◉?81 — Signal Ark: Full Ritual Engine</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
  }
  #ui {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 10;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 98vw;
  }
  button {
    background: rgba(0,180,255,0.07);
    border: 1px solid rgba(0,180,255,0.35);
    color: #0bf;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    padding: 5px 11px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  button:hover { background: rgba(0,180,255,0.18); border-color: #0bf; }
  button.active { background: rgba(255,80,80,0.13); border-color: #f55; color: #f55; }
  button#btnScramble { border-color: rgba(255,140,0,0.5); color: #fa0; }
  button#btnScramble:hover { background: rgba(255,140,0,0.15); }
  button#btnShare { border-color: rgba(40,255,140,0.5); color: #2fa; }
  button#btnShare:hover { background: rgba(40,255,140,0.12); }
  #status {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(240,192,40,0.65);
    font-size: 10px;
    letter-spacing: 2.5px;
    text-align: center;
    pointer-events: none;
    width: 90vw;
  }
  #shareToast {
    position: fixed;
    bottom: 52px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    border: 1px solid rgba(40,255,140,0.5);
    color: #2fa;
    font-size: 10px;
    letter-spacing: 1.5px;
    padding: 7px 14px;
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
    white-space: nowrap;
  }
  #shareToast.show { opacity: 1; }
</style>

<body>
<div id="ui">
  <button id="btnGlitch">GLITCH</button>
  <button id="btnAnomaly">INJECT ANOMALY</button>
  <button id="btnSync">FORCE SYNC</button>
  <button id="btnScramble">SCRAMBLE THE ARK</button>
  <button id="btnShare">SHARE SYNC</button>
  <button id="btnSound">SOUND: ON</button>
</div>
<div id="shareToast"></div>
<div id="status">CLICK FISH TO ACTIVATE · SEQUENCE: —</div>

<script>
// ─── Web Audio Engine ───────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let soundEnabled = true;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, type, duration, gainVal, delay = 0, detune = 0) {
  if (!soundEnabled) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = type;
  osc.frequency.value = freq;
  osc.detune.value = detune;
  const t = audioCtx.currentTime + delay;
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(gainVal, t + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
  osc.start(t);
  osc.stop(t + duration + 0.05);
}

function playGlitchDrone(active) {
  if (!soundEnabled || !active) return;
  ensureAudio();
  // C# = 277.18 Hz, low pad
  playTone(138.59, 'sawtooth', 1.2, 0.04);
  playTone(277.18, 'sawtooth', 1.2, 0.025, 0, -15);
}

function playRepairChime() {
  // G5 = 783.99
  playTone(783.99, 'sine', 1.0, 0.12);
  playTone(987.77, 'sine', 0.6, 0.06, 0.15);
}

function playSyncChime() {
  // C#5 → E5 → A5
  playTone(554.37, 'sine', 0.7, 0.14, 0);
  playTone(659.25, 'sine', 0.7, 0.12, 0.18);
  playTone(880.00, 'sine', 0.9, 0.15, 0.36);
}

function playHeartbeat() {
  playTone(55, 'sine', 0.12, 0.18);
  playTone(55, 'sine', 0.10, 0.12, 0.18);
}

function playScramble() {
  for (let i = 0; i < 5; i++) {
    playTone(200 + Math.random() * 400, 'sawtooth', 0.08, 0.08, i * 0.06);
  }
}

function playClick(fishId) {
  const freqs = [440, 523.25, 369.99, 587.33];
  playTone(freqs[fishId], 'sine', 0.25, 0.1);
}

// ─── p5 Sketch ──────────────────────────────────────────────────────
new p5(function(p) {
  let angle = 0;
  let gearAngle = 0;
  let gearSpeed = 0.008;
  let targetGearSpeed = 0.008;
  let pulseT = 0;
  let W, H, cx, cy, R;

  let glitchMode = false;
  let glitchIntensity = 0;
  let anomalyActive = false;
  let anomalyTimer = 0;
  let anomalyPhase = 0;
  let syncMode = false;
  let syncTimer = 0;
  let goldFlash = 0;
  let scrambleFlash = 0;
  let overclock = 0; // frames of gear overclock remaining

  let clickSequence = [];
  let lastSyncSeq = '';
  let heartbeatTimer = 0;
  let glitchDroneTimer = 0;

  let sparks = [];

  const fishData = [
    { id: 0, label: 'APPROACHING', color: [0, 180, 255],  orbitAngle: Math.PI * 1.25, hooked: false, dir: 1,  glowing: false, trail: [], vx: 0, vy: 0, scrambled: false },
    { id: 1, label: 'CAUGHT',      color: [0, 220, 180],  orbitAngle: Math.PI * 0.75, hooked: true,  dir: -1, glowing: false, trail: [], vx: 0, vy: 0, scrambled: false },
    { id: 2, label: 'TANGLED',     color: [180, 0, 255],  orbitAngle: Math.PI * 1.75, hooked: true,  dir: 1,  glowing: false, trail: [], vx: 0, vy: 0, scrambled: false },
    { id: 3, label: 'RELEASED',    color: [0, 230, 120],  orbitAngle: Math.PI * 0.25, hooked: false, dir: -1, glowing: false, trail: [], vx: 0, vy: 0, scrambled: false },
  ];

  // UI wiring
  document.getElementById('btnGlitch').addEventListener('click', () => {
    glitchMode = !glitchMode;
    document.getElementById('btnGlitch').classList.toggle('active', glitchMode);
    if (glitchMode) glitchDroneTimer = 90;
  });
  document.getElementById('btnAnomaly').addEventListener('click', () => {
    if (!anomalyActive) { anomalyActive = true; anomalyPhase = 0; anomalyTimer = 0; }
  });
  document.getElementById('btnSync').addEventListener('click', () => {
    triggerSync(['FORCED']);
  });
  document.getElementById('btnScramble').addEventListener('click', scramble);
  document.getElementById('btnShare').addEventListener('click', shareSync);
  document.getElementById('btnSound').addEventListener('click', () => {
    soundEnabled = !soundEnabled;
    document.getElementById('btnSound').textContent = soundEnabled ? 'SOUND: ON' : 'SOUND: OFF';
  });

  function scramble() {
    playScramble();
    scrambleFlash = 30;
    clickSequence = [];
    fishData.forEach(f => {
      f.glowing = false;
      f.trail = [];
      f.orbitAngle = Math.random() * Math.PI * 2;
      f.dir = Math.random() < 0.5 ? 1 : -1;
      f.scrambled = true;
    });
    setTimeout(() => fishData.forEach(f => f.scrambled = false), 500);
    setStatus('⚡ ANOMALY INJECTED — SYSTEM UNSYNCED');
    setTimeout(() => setStatus('CLICK FISH TO ACTIVATE · SEQUENCE: —'), 2000);
  }

  function shareSync() {
    const seq = lastSyncSeq || clickSequence.join('') || '???';
    const url = `https://signalark.swagg/ritual?seq=${seq}&verified=${lastSyncSeq ? 'true' : 'false'}&ts=${Date.now()}`;
    navigator.clipboard.writeText(url).catch(() => {});
    showToast('RITUAL URL COPIED: ?' + seq);
  }

  function triggerSync(seq) {
    lastSyncSeq = Array.isArray(seq) ? seq.join('') : seq;
    syncMode = true;
    syncTimer = 240;
    goldFlash = 80;
    overclock = 180;
    targetGearSpeed = 0.022;
    playSyncChime();
    setStatus('◉ SEQUENCE VERIFIED — SYNC ACHIEVED ◉');
    setTimeout(() => setStatus('CLICK FISH TO ACTIVATE · SEQUENCE: —'), 3500);
    clickSequence = [];
    spawnSparks();
  }

  function spawnSparks() {
    for (let i = 0; i < 24; i++) {
      let a = Math.random() * Math.PI * 2;
      let sp = 1.5 + Math.random() * 3;
      sparks.push({
        x: 0, y: 0,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 60 + Math.random() * 40,
        maxLife: 100,
        col: Math.random() < 0.5 ? [240, 192, 40] : [0, 220, 180]
      });
    }
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  function showToast(msg) {
    const t = document.getElementById('shareToast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  p.setup = function() {
    W = Math.min(window.innerWidth, window.innerHeight, 560);
    H = W;
    R = W * 0.34;
    cx = W / 2; cy = H / 2;
    let cnv = p.createCanvas(W, H);
    cnv.parent(document.body);
    cnv.style('display', 'block');
    p.smooth();
  };

  p.draw = function() {
    // Background
    if (scrambleFlash > 0) {
      scrambleFlash--;
      p.background(30, 5, 0, 60);
    } else if (glitchMode && p.random() < 0.25) {
      p.background(p.random(0,18), 0, p.random(0,12), 55);
    } else if (anomalyActive && anomalyPhase === 0) {
      p.background(18, 0, 0, 32);
    } else {
      p.background(0, 0, 0, 26);
    }

    pulseT += 0.025;

    // Gear speed management
    if (overclock > 0) {
      overclock--;
      targetGearSpeed = p.lerp(0.022, 0.008, 1 - overclock / 180);
    } else {
      targetGearSpeed = 0.008;
    }
    gearSpeed = p.lerp(gearSpeed, targetGearSpeed, 0.05);
    gearAngle += gearSpeed;

    // Heartbeat synced to gear
    heartbeatTimer++;
    if (heartbeatTimer >= Math.round(p.TWO_PI / (gearSpeed * 60)) * 4) {
      heartbeatTimer = 0;
      playHeartbeat();
    }

    // Glitch drone
    if (glitchMode && glitchDroneTimer > 0) {
      glitchDroneTimer--;
      if (glitchDroneTimer % 45 === 0) playGlitchDrone(true);
    }

    angle += gearSpeed * 0.5;

    p.translate(cx, cy);

    // Glitch offset
    let gx = 0, gy = 0;
    if (glitchMode) {
      glitchIntensity = p.lerp(glitchIntensity, 6, 0.1);
      if (p.random() < 0.12) {
        gx = p.random(-glitchIntensity, glitchIntensity);
        gy = p.random(-glitchIntensity * 0.3, glitchIntensity * 0.3);
        // RGB split on glitch frames
        p.push();
        p.translate(gx * 2, 0);
        p.tint && p.tint(255, 0, 0, 60);
        p.pop();
      }
    } else {
      glitchIntensity = p.lerp(glitchIntensity, 0, 0.08);
    }
    p.translate(gx, gy);

    // Sync halo
    if (syncMode) {
      syncTimer--;
      let sp = Math.sin(pulseT * 5) * 0.5 + 0.5;
      drawNeonEllipse(0, 0, R * 2.35, R * 2.35, [0, 255, 160], 0.4 + sp * 2.5);
      if (syncTimer <= 0) syncMode = false;
    }

    // Anomaly sequence
    if (anomalyActive) {
      anomalyTimer++;
      if (anomalyTimer < 80) {
        anomalyPhase = 0;
        let rp = anomalyTimer / 80;
        p.noFill();
        p.stroke(255, 40, 40, 180 * (1 - rp));
        p.strokeWeight(2 + rp * 5);
        p.ellipse(0, 0, R * 2.2 * rp, R * 2.2 * rp);
        if (anomalyTimer === 2) playTone(120, 'sawtooth', 0.8, 0.08);
      } else if (anomalyTimer < 160) {
        anomalyPhase = 1;
        let rp = (anomalyTimer - 80) / 80;
        p.noFill();
        p.stroke(240, 192, 40, 150 * (1 - rp));
        p.strokeWeight(2.5);
        p.ellipse(0, 0, R * 1.5, R * 1.5);
        for (let i = 0; i < 4; i++) {
          let ba = (i / 4) * p.TWO_PI + anomalyTimer * 0.06;
          p.stroke(240, 192, 40, 130);
          p.strokeWeight(1.5);
          p.line(Math.cos(ba)*R*0.15, Math.sin(ba)*R*0.15,
                 Math.cos(ba)*R*rp, Math.sin(ba)*R*rp);
        }
        if (anomalyTimer === 82) playRepairChime();
      } else if (anomalyTimer < 230) {
        anomalyPhase = 2;
        let rp = (anomalyTimer - 160) / 70;
        p.noFill();
        p.stroke(40, 255, 120, 210 * (1 - rp));
        p.strokeWeight(3 - rp * 2);
        p.ellipse(0, 0, R * 2.15 * rp, R * 2.15 * rp);
      } else {
        anomalyActive = false;
        anomalyTimer = 0;
      }
    }

    // Gold sync flash
    if (goldFlash > 0) {
      goldFlash--;
      p.noStroke();
      p.fill(240, 192, 40, goldFlash * 2.5);
      p.ellipse(0, 0, R * 2.6, R * 2.6);
    }

    // Overclock sparks
    updateSparks();

    // Orbit rings
    let orbitCol = anomalyActive && anomalyPhase === 0 ? [255, 60, 60] :
                   syncMode ? [0, 255, 160] : [0, 200, 255];
    drawNeonEllipse(0, 0, R * 2, R * 2, orbitCol, 1.2 + 0.3 * Math.sin(pulseT));
    drawNeonEllipse(0, 0, R * 1.2, R * 1.2, [80, 255, 200], 0.55);

    // Gear — blur trail on overclock
    p.push();
    p.translate(0, -R * 1.05);
    if (overclock > 140) {
      // motion blur: draw ghost copies
      for (let b = 3; b > 0; b--) {
        p.push();
        p.rotate(gearAngle - gearSpeed * b * 2);
        let gc = [0, 180, 255];
        p.stroke(gc[0], gc[1], gc[2], 15 * b);
        p.strokeWeight(2);
        p.noFill();
        gearPath(W * 0.072);
        p.pop();
      }
    }
    p.rotate(gearAngle);
    let gearCol = anomalyActive && anomalyPhase === 0 ? [255, 80, 80] :
                  overclock > 0 ? [255, 220, 60] : [0, 180, 255];
    drawGear(W * 0.072, gearCol, 2);
    p.pop();

    // Shields
    let shieldCol = scrambleFlash > 0 ? [255, 60, 60] :
                    anomalyActive && anomalyPhase === 0 ? [255, 60, 60] :
                    anomalyActive && anomalyPhase === 2 ? [40, 255, 120] : [0, 160, 255];
    drawShield(-R * 0.52, 0, shieldCol, W * 0.065);
    drawShield(R * 0.52, 0, shieldCol, W * 0.065);

    // Fish
    for (let i = 0; i < fishData.length; i++) {
      let f = fishData[i];
      let a = f.orbitAngle + angle * f.dir;
      let fx = Math.cos(a) * R;
      let fy = Math.sin(a) * R;

      // Trail
      f.trail.push({ x: fx, y: fy });
      if (f.trail.length > (f.glowing ? 32 : 6)) f.trail.shift();
      if (f.glowing || overclock > 0) {
        for (let t = 0; t < f.trail.length - 1; t++) {
          let alpha = (t / f.trail.length) * (f.glowing ? 130 : 60);
          p.stroke(f.color[0], f.color[1], f.color[2], alpha);
          p.strokeWeight(1.5);
          p.line(f.trail[t].x, f.trail[t].y, f.trail[t+1].x, f.trail[t+1].y);
        }
      }

      let dfx = fx, dfy = fy;
      if (glitchMode && f.id === 2) {
        dfx += p.random(-5, 5);
        dfy += p.random(-3, 3);
      }

      p.push();
      p.translate(dfx, dfy);
      let facing = a + (f.dir > 0 ? Math.PI / 2 : -Math.PI / 2);
      p.rotate(facing);
      let fc = [...f.color];
      if (glitchMode && f.id === 2 && p.random() < 0.25) {
        fc = [255 - fc[0], 255 - fc[1], 255 - fc[2]];
      }
      drawFish(fc, W * 0.055, f.hooked, f.glowing, overclock > 0);
      p.pop();

      // Hook lines
      if (f.hooked) {
        let hx = Math.cos(a) * R * 0.62, hy = Math.sin(a) * R * 0.62;
        let lc = anomalyActive && anomalyPhase === 0 && f.id === 2 ? [255, 40, 40] : f.color;
        p.stroke(lc[0], lc[1], lc[2], 110);
        p.strokeWeight(1);
        p.noFill();
        p.beginShape();
        p.curveVertex(fx, fy); p.curveVertex(fx, fy);
        p.curveVertex((fx+hx)/2+14, (fy+hy)/2-14);
        p.curveVertex(hx, hy); p.curveVertex(hx, hy);
        p.endShape();
        p.noFill(); p.stroke(lc[0], lc[1], lc[2], 190); p.strokeWeight(1.5);
        p.arc(hx, hy, 10, 10, 0, Math.PI);
      }
    }

    // Center glyph
    drawCenter(pulseT);

    // Sequence progress dots
    if (clickSequence.length > 0) {
      for (let i = 0; i < clickSequence.length; i++) {
        let f = fishData[clickSequence[i]];
        p.noStroke();
        p.fill(f.color[0], f.color[1], f.color[2], 180);
        p.ellipse(-12 + i * 12, R * 1.35, 7, 7);
      }
    }
  };

  function updateSparks() {
    for (let i = sparks.length - 1; i >= 0; i--) {
      let s = sparks[i];
      s.x += s.vx; s.y += s.vy;
      s.vy += 0.04;
      s.life--;
      let alpha = (s.life / s.maxLife) * 200;
      p.stroke(s.col[0], s.col[1], s.col[2], alpha);
      p.strokeWeight(2);
      p.point(s.x, s.y);
      if (s.life <= 0) sparks.splice(i, 1);
    }
  }

  p.mousePressed = function() {
    ensureAudio();
    let mx = p.mouseX - cx, my = p.mouseY - cy;
    for (let i = 0; i < fishData.length; i++) {
      let f = fishData[i];
      let a = f.orbitAngle + angle * f.dir;
      let fx = Math.cos(a) * R, fy = Math.sin(a) * R;
      if (p.dist(mx, my, fx, fy) < W * 0.09) {
        f.glowing = !f.glowing;
        playClick(f.id);
        if (f.glowing) {
          clickSequence.push(f.id);
          setStatus('SEQ: ' + clickSequence.join('→') + '  |  ' + f.label);
          // Check win: 0→1→3
          if (clickSequence.length >= 3) {
            let l = clickSequence.slice(-3);
            if (l[0] === 0 && l[1] === 1 && l[2] === 3) triggerSync(l);
          }
        }
        break;
      }
    }
  };

  // ─── Drawing helpers ────────────────────────────────────────────

  function drawNeonEllipse(x, y, w, h, col, weight) {
    p.noFill();
    for (let i = 3; i >= 0; i--) {
      p.stroke(col[0], col[1], col[2], 14 + i * 11);
      p.strokeWeight(weight + i * 2.5);
      p.ellipse(x, y, w, h);
    }
    p.stroke(col[0], col[1], col[2], 195);
    p.strokeWeight(weight);
    p.ellipse(x, y, w, h);
  }

  function gearPath(r) {
    let teeth = 12, innerR = r * 0.72, outerR = r;
    p.beginShape();
    for (let i = 0; i < teeth * 2; i++) {
      let a = (i / (teeth * 2)) * p.TWO_PI;
      let rr = i % 2 === 0 ? outerR : innerR;
      p.vertex(Math.cos(a) * rr, Math.sin(a) * rr);
    }
    p.endShape(p.CLOSE);
  }

  function drawGear(r, col, sw) {
    p.noFill();
    for (let g = 2; g >= 0; g--) {
      p.stroke(col[0], col[1], col[2], 22 + g * 28);
      p.strokeWeight(sw + g * 2);
      gearPath(r);
    }
    p.stroke(col[0], col[1], col[2], 200);
    p.strokeWeight(sw);
    gearPath(r);
    p.ellipse(0, 0, r * 0.45, r * 0.45);
  }

  function drawShield(x, y, col, size) {
    p.push(); p.translate(x, y);
    let s = size;
    p.noFill();
    for (let g = 2; g >= 0; g--) {
      p.stroke(col[0], col[1], col[2], 16 + g * 22);
      p.strokeWeight(1.5 + g * 1.5);
      shieldPath(s);
    }
    p.stroke(col[0], col[1], col[2], 195); p.strokeWeight(1.5);
    shieldPath(s);
    p.stroke(col[0], col[1], col[2], 175); p.strokeWeight(1.5);
    p.line(0, -s*0.35, 0, s*0.35); p.line(-s*0.35, 0, s*0.35, 0);
    p.pop();
  }

  function shieldPath(s) {
    p.beginShape();
    p.vertex(-s*0.6, -s*0.7); p.vertex(s*0.6, -s*0.7);
    p.vertex(s*0.6, s*0.2);
    p.bezierVertex(s*0.6, s*0.6, 0, s*0.9, 0, s*0.9);
    p.bezierVertex(0, s*0.9, -s*0.6, s*0.6, -s*0.6, s*0.2);
    p.endShape(p.CLOSE);
  }

  function drawFish(col, size, hooked, glowing, overclocked) {
    let s = size, boost = glowing ? 2 : 0;
    p.noFill();
    for (let g = 2; g >= 0; g--) {
      p.stroke(col[0], col[1], col[2], 16 + g * 26 + boost * 20);
      p.strokeWeight(1 + g * 1.4 + boost);
      fishShape(s);
    }
    p.stroke(col[0], col[1], col[2], glowing ? 255 : overclocked ? 220 : 195);
    p.strokeWeight(1.5 + boost * 0.5);
    fishShape(s);
    p.stroke(col[0], col[1], col[2], 220); p.strokeWeight(glowing ? 3 : 2);
    p.point(s * 0.3, -s * 0.08);
    p.strokeWeight(0.8); p.stroke(col[0], col[1], col[2], 100);
    p.line(-s*0.05, -s*0.2, s*0.1, 0); p.line(-s*0.15, -s*0.15, -s*0.05, s*0.1);
  }

  function fishShape(s) {
    p.beginShape();
    p.vertex(s*0.5, 0);
    p.bezierVertex(s*0.4, -s*0.3, -s*0.2, -s*0.3, -s*0.4, 0);
    p.bezierVertex(-s*0.2, s*0.3, s*0.4, s*0.3, s*0.5, 0);
    p.endShape(p.CLOSE);
    p.beginShape();
    p.vertex(-s*0.4, 0); p.vertex(-s*0.8, -s*0.3);
    p.vertex(-s*0.65, 0); p.vertex(-s*0.8, s*0.3);
    p.endShape(p.CLOSE);
  }

  function drawCenter(t) {
    let pulse = 1 + 0.06 * Math.sin(t * 2);
    let cc = syncMode ? [40, 255, 160] :
             overclock > 0 ? [255, 220, 60] :
             anomalyActive && anomalyPhase === 0 ? [255, 80, 80] : [240, 192, 40];
    for (let g = 4; g >= 0; g--) {
      p.stroke(cc[0], cc[1], cc[2], 7 + g * 9);
      p.strokeWeight(g * 3);
      p.noFill();
      p.ellipse(0, 0, 44 * pulse, 44 * pulse);
    }
    p.noStroke();
    p.fill(cc[0], cc[1], cc[2], 228 + 22 * Math.sin(t));
    p.textAlign(p.CENTER, p.CENTER);
    p.textSize(W * 0.052);
    p.textStyle(p.BOLD);
    p.text('○-81-○', 0, 0);
    p.fill(cc[0], cc[1], cc[2], 95);
    p.textSize(W * 0.017);
    p.textStyle(p.NORMAL);
    let label = syncMode ? 'SYNC CONFIRMED' :
                overclock > 120 ? 'HIGH THROUGHPUT' :
                anomalyActive ? ['ANOMALY DETECTED','REPAIRING...','INTEGRITY CONFIRMED'][anomalyPhase] :
                'SIGNAL ARK';
    p.text(label, 0, W * 0.064);
  }

  p.windowResized = function() {
    W = Math.min(window.innerWidth, window.innerHeight, 560);
    H = W; R = W * 0.34; cx = W/2; cy = H/2;
    p.resizeCanvas(W, H);
  };
});
</script>

<script>
// ─── LIVE ARK CONNECTION ─────────────────────────────────────────────
// Connects the Signal Ark visual engine to live Bailey ARK verification events

const ARK_SUPABASE_URL  = 'https://aklxxrmytplbrjqunkpg.supabase.co';
const ARK_SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFrbHh4cm15dHBsYnJqcXVua3BnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzc0NDcsImV4cCI6MjA4NzgxMzQ0N30.7NBf784LfeulBFH2u8HAdVHJgPIksfeAor7iA5R36f0';

// ─── Event queue — p5 sketch reads from this ─────────────────────────
window.ARK_EVENT_QUEUE  = [];
window.ARK_LIVE_COUNT   = { total: 0, verified: 0, declined: 0 };
window.ARK_CONNECTED    = false;

// Seed a deterministic fish index from token_hash
function seedFromHash(hash) {
  if (!hash || hash.length < 8) return 0;
  return parseInt(hash.slice(0, 8), 16) % 4;
}

// Map verification event → Signal Ark event type
function mapArkEvent(record) {
  const rawId = (record.id || '').replace(/-/g, '');
  const fishIndex = seedFromHash(rawId);
  const isVerified = record.verified !== false;
  return {
    fishIndex,
    type: isVerified ? 'VERIFIED' : 'DECLINED',
    category: record.source || 'gate',
    confidence: 1.0,
    hash: rawId ? rawId.slice(0, 8) : '????????',
    timestamp: record.verified_at,
  };
}

// ─── Boot the live connection ─────────────────────────────────────────
function bootArkLive() {
  if (!window.supabase) {
    setTimeout(bootArkLive, 500);
    return;
  }

  const db = window.supabase.createClient(ARK_SUPABASE_URL, ARK_SUPABASE_KEY);

  // Load recent events on startup
  db.from('age_verifications')
    .select('*')
    .order('verified_at', { ascending: false })
    .limit(10)
    .then(({ data }) => {
      if (data && data.length > 0) {
        window.ARK_LIVE_COUNT.total = data.length;
        window.ARK_LIVE_COUNT.verified = data.filter(r => r.verified !== false).length;
        window.ARK_LIVE_COUNT.declined = data.filter(r => r.verified === false).length;
        // Replay last 3 visually on load
        data.slice(0, 3).reverse().forEach((r, i) => {
          setTimeout(() => {
            window.ARK_EVENT_QUEUE.push(mapArkEvent(r));
          }, i * 800);
        });
        window.ARK_CONNECTED = true;
        updateArkStatus();
      }
    });

  // Subscribe to live events
  db.channel('public:age_verifications')
    .on('postgres_changes',
      { event: 'INSERT', schema: 'public', table: 'age_verifications' },
      (payload) => {
        const evt = mapArkEvent(payload.new);
        window.ARK_EVENT_QUEUE.push(evt);

        // Update live counters
        window.ARK_LIVE_COUNT.total++;
        if (payload.new.verified !== false) {
          window.ARK_LIVE_COUNT.verified++;
        } else {
          window.ARK_LIVE_COUNT.declined++;
        }

        updateArkStatus();

        // Flash anomaly on declined verification
        if (payload.new.verified === false) {
          const anomalyBtn = document.getElementById('btnAnomaly');
          if (anomalyBtn) anomalyBtn.click();
        }
      }
    )
    .subscribe((status) => {
      window.ARK_CONNECTED = (status === 'SUBSCRIBED');
      updateArkStatus();
    });
}

function updateArkStatus() {
  const el = document.getElementById('arkLiveStatus');
  if (!el) return;
  const c = window.ARK_LIVE_COUNT;
  if (window.ARK_CONNECTED) {
    el.textContent = `◉ LIVE  ·  ${c.total} EVENTS  ·  ${c.verified} VERIFIED  ·  ${c.declined} DECLINED`;
    el.style.color = 'rgba(40,255,160,0.8)';
  } else {
    el.textContent = '◌ CONNECTING TO ARK...';
    el.style.color = 'rgba(240,192,40,0.5)';
  }
}

// ─── Patch p5 sketch to consume ARK events ───────────────────────────
// We hook into the existing fishData by watching the queue each frame.
// When an event arrives: activate the target fish, trigger sync or anomaly.
const _origP5 = window.p5;
window._ARK_PATCH_READY = false;

// Poll until p5 sketch is running, then patch the draw loop
function patchSketch() {
  // Signal Ark exposes fishData on window after sketch init
  // We poll the queue in a requestAnimationFrame loop instead
  function processQueue() {
    if (window.ARK_EVENT_QUEUE.length > 0) {
      const evt = window.ARK_EVENT_QUEUE.shift();

      // Trigger the matching fish click sequence in the existing engine
      const canvas = document.querySelector('canvas');
      if (canvas) {
        // Simulate clicking the fish by dispatching a synthetic mouse event
        // The fish positions are at orbit positions — trigger via button proxies instead
        if (evt.type === 'VERIFIED') {
          // Force sync — verified event
          const syncBtn = document.getElementById('btnSync');
          if (syncBtn) syncBtn.click();
        } else {
          // Anomaly — declined event
          const anomalyBtn = document.getElementById('btnAnomaly');
          if (anomalyBtn) anomalyBtn.click();
        }
      }

      // Update status bar with event detail
      const statusEl = document.getElementById('status');
      if (statusEl) {
        const icon = evt.type === 'VERIFIED' ? '✓' : '✗';
        statusEl.textContent = `${icon} ARK EVENT · ${evt.type} · ${evt.category.toUpperCase()} · HASH: ${evt.hash}…`;
        setTimeout(() => {
          if (statusEl.textContent.includes(evt.hash)) {
            statusEl.textContent = 'CLICK FISH TO ACTIVATE · SEQUENCE: —';
          }
        }, 3000);
      }
    }
    requestAnimationFrame(processQueue);
  }
  processQueue();
}

// ─── DOM additions ────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
